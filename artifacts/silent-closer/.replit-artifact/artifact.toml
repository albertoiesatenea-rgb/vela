kind = "web"
previewPath = "/"
title = "Silent Closer Copilot"
version = "1.0.0"
id = "artifacts/silent-closer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24778

[services.development]
run = "pnpm --filter @workspace/silent-closer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/silent-closer", "run", "build" ]
publicDir = "artifacts/silent-closer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24778"
BASE_PATH = "/"
