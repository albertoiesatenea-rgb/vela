openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: copilot
    description: Silent Closer Copilot tactical analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /copilot/analyze:
    post:
      operationId: analyzeConversation
      tags: [copilot]
      summary: Analyze conversation text
      description: Analyzes conversation fragment and returns tactical coaching output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Tactical analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRequest:
      type: object
      properties:
        text:
          type: string
          description: Conversation fragment to analyze
          minLength: 1
        context:
          type: string
          description: Optional session context to guide the tactical analysis
        call_memory:
          type: string
          description: Accumulated call memory from previous analyses to be updated
      required:
        - text
    AnalyzeDetail:
      type: object
      properties:
        reading:
          type: string
          description: Richer interpretation of what is happening beneath the surface (1 sentence)
        next_move:
          type: string
          description: The single best actionable move — best question, best reframe, best close line. One path only.
        support:
          type: string
          description: Brief tactical reinforcement — reframing criterion, useful data type, or key commercial reminder. Never invent figures.
    Journey:
      type: object
      properties:
        past:
          type: string
          description: Academic label for the last completed phase (2-4 words, e.g. "Propuesta presentada")
        now:
          type: string
          description: Specific description of what is happening right now — academic phase name + situational context (3-7 words, e.g. "Manejo de objeción reputacional")
        next:
          type: string
          description: Next step to lead toward the session goal (2-4 words, e.g. "Aterrizar el criterio")
      required:
        - past
        - now
        - next
    AnalyzeResponse:
      type: object
      properties:
        say_now:
          type: string
          description: Tactical action to take (4-12 words)
        avoid:
          type: string
          description: What to avoid — only when there is a real, probable tactical error. Omit or leave empty if not critical.
        hint:
          type: string
          description: Brief coaching note — the tactical objective behind say_now (1 sentence, natural tone, max 15 words)
        detail:
          $ref: "#/components/schemas/AnalyzeDetail"
        journey:
          $ref: "#/components/schemas/Journey"
        call_memory:
          type: string
          description: Updated accumulated tactical summary of the call so far (4-6 bullet lines)
      required:
        - say_now
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
