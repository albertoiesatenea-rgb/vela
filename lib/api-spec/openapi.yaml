openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: copilot
    description: Silent Closer Copilot tactical analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /copilot/analyze:
    post:
      operationId: analyzeConversation
      tags: [copilot]
      summary: Analyze conversation text
      description: Analyzes conversation fragment and returns tactical coaching output
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Tactical analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRequest:
      type: object
      properties:
        text:
          type: string
          description: Conversation fragment to analyze
          minLength: 1
        context:
          type: string
          description: Optional session context to guide the tactical analysis
      required:
        - text
    AnalyzeDetail:
      type: object
      properties:
        reading:
          type: string
          description: What the engine is detecting beneath the surface (1 sentence)
        argument:
          type: string
          description: How to frame or orient the conversation (1 line)
        question:
          type: string
          description: A suggested follow-up question if SAY NOW is not enough
        risk:
          type: string
          description: The specific tactical error to avoid (1 line)
        support:
          type: string
          description: A brief supporting note on what to do (1 line)
    AnalyzeResponse:
      type: object
      properties:
        signal:
          type: string
          description: Short signal label (2-5 words)
        say_now:
          type: string
          description: Tactical action to take (4-12 words)
        avoid:
          type: string
          description: What to avoid doing right now (2-6 words)
        detail:
          $ref: "#/components/schemas/AnalyzeDetail"
      required:
        - signal
        - say_now
        - avoid
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
